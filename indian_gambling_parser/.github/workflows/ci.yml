name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r web_service/backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Останавливаем сборку, если есть ошибки линтинга
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Выводим предупреждения, но не останавливаем сборку
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Format check with black
      run: |
        pip install black
        black --check web_service/backend/app web_service/backend/tests || true
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy web_service/backend/app --ignore-missing-imports || true
      continue-on-error: true
    
    - name: Run unit tests
      run: |
        pytest tests/test_storage.py -v --tb=short
    
    - name: Run integration tests
      run: |
        pytest tests/test_api.py -v --tb=short
      continue-on-error: true
    
    - name: Test coverage
      run: |
        pytest tests/ --cov=storage --cov=web_service/backend/app --cov-report=xml --cov-report=term-missing
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      continue-on-error: true

  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
    
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r web_service/backend/requirements.txt
    
    - name: Test backend imports
      working-directory: web_service/backend
      run: |
        python -c "from app.main import app; print('✅ Backend imports OK')"
    
    - name: Test backend health
      working-directory: web_service/backend
      run: |
        python -c "from fastapi.testclient import TestClient; from app.main import app; client = TestClient(app); r = client.get('/health'); assert r.status_code == 200; print('✅ Health check OK')"

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web_service/frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: web_service/frontend
      run: npm ci
    
    - name: Lint frontend
      working-directory: web_service/frontend
      run: npm run lint || true
      continue-on-error: true
    
    - name: Build frontend
      working-directory: web_service/frontend
      run: npm run build
      continue-on-error: true
