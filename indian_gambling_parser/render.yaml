services:
  # Redis для кэширования
  - type: redis
    name: providers-redis
    plan: free
    ipAllowList: []

  # Backend API (Python/FastAPI)
  - type: web
    name: providers-api
    env: python
    plan: free
    buildCommand: |
      pip install -r web_service/backend/requirements.txt
    startCommand: |
      cd web_service/backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: providers-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CACHE_TTL
        value: 300
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AUTH_ENABLED
        value: "false"
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/web_service/backend

  # Frontend (React/Vite)
  - type: web
    name: providers-frontend
    env: static
    plan: free
    buildCommand: |
      cd web_service/frontend && npm ci && npm run build
    staticPublishPath: web_service/frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://providers-api.onrender.com/api
